:root {
  --bg:#0f172a;--surface:#1e293b;--surface2:#334155;--border:#475569;
  --text:#f1f5f9;--text-muted:#94a3b8;--accent:#3b82f6;
  --green:#22c55e;--green-bg:rgba(34,197,94,.12);
  --yellow:#eab308;--yellow-bg:rgba(234,179,8,.12);
  --orange:#f97316;--orange-bg:rgba(249,115,22,.12);
  --red:#ef4444;--red-bg:rgba(239,68,68,.12);
  --purple:#a855f7;--purple-bg:rgba(168,85,247,.12);
  --blue-bg:rgba(59,130,246,.12);

*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;overflow-x:hidden}
.container{max-width:1700px;margin:0 auto;padding:20px 24px}
.header{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:16px}
.header h1{font-size:1.6rem;font-weight:700;letter-spacing:-.02em}
.header h1 span{color:var(--accent)}
.header-sub{font-size:.85rem;color:var(--text-muted);font-weight:400;margin-top:2px}
.header-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px}
.status-bar{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;background:var(--surface);border:1px solid var(--border);border-radius:20px;font-size:.72rem;font-weight:600}
.status-dot{width:7px;height:7px;border-radius:50%}
.status-dot.live{background:var(--green);animation:pulse 2s infinite}
.status-dot.local{background:var(--yellow)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:16px;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:12px}
.controls input,.controls select{background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:7px 12px;font-size:.82rem;outline:none}
.controls input:focus,.controls select:focus{border-color:var(--accent)}
.controls input[type="text"]{width:220px}
.controls select{min-width:110px}
.user-selector{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:.8rem;color:var(--text-muted)}
.user-selector select{font-weight:600;color:var(--accent)}
.health-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:10px;margin-bottom:20px}
.health-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 16px;display:flex;flex-direction:column;gap:2px}
.health-card .label{font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);font-weight:600}
.health-card .value{font-size:1.5rem;font-weight:700}
.health-card .detail{font-size:.72rem;color:var(--text-muted)}
.health-card.alert{border-left:3px solid var(--red)}
.health-card.warn{border-left:3px solid var(--orange)}
.health-card.good{border-left:3px solid var(--green)}
.health-card.info{border-left:3px solid var(--accent)}
.layer-tabs{display:flex;gap:4px;margin-bottom:16px;border-bottom:2px solid var(--border);padding-bottom:0}
.layer-tab{padding:10px 20px;font-size:.85rem;font-weight:600;cursor:pointer;color:var(--text-muted);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;background:none;border-top:none;border-left:none;border-right:none;white-space:nowrap}
.layer-tab:hover{color:var(--text)}
.layer-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.layer-tab .count{display:inline-flex;align-items:center;justify-content:center;min-width:20px;height:18px;padding:0 5px;background:var(--surface2);border-radius:9px;font-size:.68rem;margin-left:6px;font-weight:700}

/* === Case Folder Links (SharePoint/OneDrive) === */
const SP_BASE = "https://theblackstonefirmcom-my.sharepoint.com/personal/rquadrel_blackstonepc_com/Documents/Active%20Cases";
const SP_ROUTES = {
  'root': '',
  'discovery-class': '/Discovery/Class/Written%20Discovery',
  'discovery-paga': '/Discovery/PAGA/Written%20Discovery',
  'productions-class': '/Discovery/Class/Document%20Productions',

  'pleadings': '/Pleadings%2C%20Motions%20and%20Court%20Filings',

  'settlement': '/Settlement%20%26%20Mediation',
  'evidence': '/Evidence',
  'research': '/Research%2C%20Memos%20%26%20Notes',
};
var ARTIFACT_REGISTRY = { mappings: {} };
(function loadRegistry(){
  try {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', '/shared/artifact-registry.json', false); // sync load before render
    xhr.send(null);
    if (xhr.status === 200) { ARTIFACT_REGISTRY = JSON.parse(xhr.responseText); }
  } catch(e) { /* registry optional */ }
})();
function getArtifact(matterKey, artifactType) {
  if (!matterKey || !ARTIFACT_REGISTRY.mappings) return null;
  var entry = ARTIFACT_REGISTRY.mappings[matterKey];
  if (!entry) return null;
  return entry[artifactType] || null;
}

function buildCaseLink(defendantName, routingKey) {
  if (!defendantName) return '#';
  routingKey = routingKey || 'root';
  // Clean defendant name to match folder name (strip parenthetical plaintiff refs)
  var clean = defendantName.replace(/\s*\(.*?\)\s*$/,'').trim();
  var slug = encodeURIComponent(clean);
  return SP_BASE + '/' + slug + (SP_ROUTES[routingKey] || '');
}
function folderIcon(defendantName, routingKey, title) {
  if (!defendantName) return '';
  var matterKey = defendantName.replace(/\s*\(.*?\)\s*$/,'').trim();
  var artifactType = routingKey || 'folder';
  var entry = getArtifact(matterKey, artifactType);
  if (!entry || !entry.url) return ''; // render nothing when unmapped
  var descriptor = entry.descriptor || title || 'Open case folder';
  return '<a href="'+entry.url+'" target="_blank" rel="noopener" title="'+descriptor.replace(/"/g,'&quot;')+'" '
    + 'style="margin-left:6px;text-decoration:none;opacity:.55;font-size:.8em;" '
    + 'onclick="event.stopPropagation()">&#128193;</a>';
}
/* draftsChip lives in /shared/drafts-chip.js — the shared module reads the
   ARTIFACT_REGISTRY loaded above and exposes draftsChip on window for the
   inline case-card template below. Load the shared script in the next tag. */

</script>

<script>
/* Watchdog — surfaces silent JS parse failures that would otherwise leave the dashboard stuck on "Loading cases…" forever.
   Added 2026-04-13. If init() has not hidden the loading message within 8s, assume the inline script failed to parse or init threw before the catch could fire. */
(function(){
  setTimeout(function(){
    var l = document.getElementById('loadingMsg');
    if (!l) return;
    if (l.style.display === 'none') return;
    if (typeof init !== 'function') {
      l.innerHTML = '<div style="color:#ef4444;font-weight:600;margin-bottom:8px">Dashboard failed to initialize</div>'
        + '<div style="font-size:.85rem;color:#94a3b8;line-height:1.5">The inline script did not parse — usually a bad character in today\'s deploy.<br>'
        + 'Open the browser console (F12) for the exact error, hard-refresh (Ctrl+Shift+R) to rule out cache, then ping Ryan.</div>';
      l.style.color = 'inherit';
    }
  }, 8000);
})();
</script>

// Cross-dashboard matching: fuzzy match defendant name against lookup keys
function matchLookup(lookup, defendant){
  if(!defendant) return null;
  var d = defendant.toLowerCase().replace(/[^a-z0-9 ]/g,'').trim();
  var keys = Object.keys(lookup);
  for(var i=0;i<keys.length;i++){
    var k = keys[i].toLowerCase().replace(/[^a-z0-9 ]/g,'').trim();
    if(d.indexOf(k)>=0 || k.indexOf(d.split(' ')[0])>=0) return lookup[keys[i]];
  }
  return null;
}

function scoreCase(c){
  var score=0,reasons=[];
  if(isPostSettlementGated(c)) return {score:0,reasons:[]};
  // 1. Client contact — firm target 60-90d. >60 medium, >90 critical. Non-date = high.
  if(c.last_client_contact){
    var lcd=parseDate(c.last_client_contact);
    if(lcd){var d=daysBetween(TODAY,lcd);
      if(d>90){score+=25;reasons.push({text:'Client contact '+d+'d stale',level:'critical'});}
      else if(d>60){score+=12;reasons.push({text:'Client contact '+d+'d (target 60d)',level:'medium'});}
    } else {score+=15;reasons.push({text:'Client contact not dated',level:'high'});}
  } else {score+=15;reasons.push({text:'No client contact on file',level:'high'});}

  // 2. Hearing proximity — only 7d is critical, 14d is high
  if(c.next_hearing_date){var hd=parseDate(c.next_hearing_date);
    if(hd){var hdays=daysBetween(hd,TODAY);
      if(hdays>=0&&hdays<=7){score+=30;reasons.push({text:'Hearing in '+hdays+'d',level:'critical'});}
      else if(hdays>7&&hdays<=14){score+=15;reasons.push({text:'Hearing in '+hdays+'d',level:'high'});}
    }
  }

  // 3. Pending motion with upcoming deadline (from Motion Dashboard)
  if(c._motion){var m=c._motion;
    if(m.opp_due){var od=parseDate(m.opp_due);if(od){var md=daysBetween(od,TODAY);
      if(md>=0&&md<=7){score+=25;reasons.push({text:m.motion+' opp due '+md+'d',level:'critical'});}
      else if(md>7&&md<=14){score+=12;reasons.push({text:m.motion+' opp due '+md+'d',level:'high'});}
    }}
    if(m.status==='PENDING'||m.status==="CONT'D"){score+=5;reasons.push({text:m.motion+' '+m.status,level:'info'});}
  }

  // 4. Arb unknown — medium priority, not urgent
  if(c.arb==='?'){score+=8;reasons.push({text:'Arb unanalyzed',level:'medium'});}

  // 5. Team update >45d stale
  if(c.last_team_update){var ltd=parseDate(c.last_team_update);
    if(ltd){var td=daysBetween(TODAY,ltd);
      if(td>60){score+=10;reasons.push({text:'Team update stale '+td+'d',level:'high'});}
    }
  }

  // 6. Competing cases — only if substantive text and no JPA
  if(c.competing_cases&&String(c.competing_cases).trim().length>5){
    var cc=c.competing_cases.toLowerCase();
    if(cc.indexOf('jpa')<0&&cc.indexOf('joint prosecution')<0&&cc.indexOf('resolved')<0&&cc.indexOf('n/a')<0){
      score+=12;reasons.push({text:'Competing case \u2014 no JPA',level:'high'});
    }
  }

  // 7. Mediation this week (from Mediation CC)
  if(c._mediation&&c._mediation.med_date){var md2=parseDate(c._mediation.med_date);
    if(md2){var mdd=daysBetween(md2,TODAY);
      if(mdd>=0&&mdd<=7){score+=20;reasons.push({text:'Mediation in '+mdd+'d',level:'critical'});}
    }
  }
  // 8. CMC filing deadline proximity (Build 2.1)
  if(c._cmc&&c._cmc.filing_deadline){var cd=parseDate(c._cmc.filing_deadline);
    if(cd){var cdd=daysBetween(cd,TODAY);
      if(cdd>=0&&cdd<=7){score+=20;reasons.push({text:(c._cmc.hearing_type||'CMC')+' filing due '+cdd+'d',level:'critical'});}
      else if(cdd>7&&cdd<=14){score+=10;reasons.push({text:(c._cmc.hearing_type||'CMC')+' filing due '+cdd+'d',level:'high'});}
    }
  }

  // 9. Mediation-aware hearing suppression (Build 2.3)
  if(c._mediation&&c._mediation.suppress_hearing_attention){
    var hearingReasons=[];var otherReasons=[];var hearingDeduct=0;
    reasons.forEach(function(r){
      if(r.text.indexOf('Hearing in')===0){hearingReasons.push(r);hearingDeduct+=(r.level==='critical'?30:15);}
      else{otherReasons.push(r);}
    });
    if(hearingDeduct>0){
      score=Math.max(0,score-Math.floor(hearingDeduct*0.6));
      hearingReasons.forEach(function(r){r.level='info';r.text+=' (med active)';});
      reasons=otherReasons.concat(hearingReasons);
    }
  }

  return{score:score,reasons:reasons};
}

function applyFilters(){
  var search=document.getElementById('searchInput').value.toLowerCase();
  var atty=document.getElementById('filterAttorney').value;
  var venue=document.getElementById('filterVenue').value;
  var arb=document.getElementById('filterArb').value;
  var ctype=document.getElementById('filterType').value;
  var fstage=document.getElementById('filterStage').value;
  var user=document.getElementById('userSelect').value;
  filteredCases=allCases.filter(function(c){
    if(search&&(c.case_name||'').toLowerCase().indexOf(search)<0&&(c.defendant||'').toLowerCase().indexOf(search)<0&&(c.plaintiff||'').toLowerCase().indexOf(search)<0&&(c.case_number||'').toLowerCase().indexOf(search)<0&&(c.defense_counsel||'').toLowerCase().indexOf(search)<0)return false;
    if(atty&&c.attorney!==atty)return false;
    if(venue&&c.venue!==venue)return false;
    if(arb&&c.arb!==arb)return false;
    if(ctype&&c.case_type!==ctype)return false;
    return true;
  });
  if(user==='Joe'&&!atty)filteredCases=filteredCases.filter(function(c){return c.attorney==='JM';});
  if(user==='Shelby'&&!atty)filteredCases=filteredCases.filter(function(c){return c.attorney==='SM';});
  filteredCases.forEach(function(c){c._stage=inferStage(c);var att=scoreCase(c);c._score=att.score;c._reasons=att.reasons;});
  if(fstage)filteredCases=filteredCases.filter(function(c){return c._stage===fstage;});
  // Phase 2 — collapse to leads only by default
  var allFilingsToggle=document.getElementById('toggleAllFilings');
  var showAll=allFilingsToggle&&allFilingsToggle.checked;
  if(!showAll){
    var keep=[];
    filteredCases.forEach(function(c){
      if(!c.matter_id){keep.push(c);return;}
      var group=COMPANION_LOOKUP[c.matter_id]||[];
      var hasLead=group.some(function(x){return x.is_lead_filing;});
      if(!hasLead||c.is_lead_filing) keep.push(c);
    });
    filteredCases=keep;
  }
  filteredCases.forEach(function(c){if(c.is_lead_filing&&c._companions&&c._companions.length) rollupMatter(c);});
  renderAll();
}

  if(urgent.length===0&&watch.length===0){list.innerHTML='<div style="text-align:center;padding:60px;color:var(--text-muted)"><p>All cases in good shape \u2014 no flags.</p></div>';return;}

    html+='<div class="aq-section-title">\u26a1 Needs Action Now ('+urgent.length+')</div>';

function renderAttentionItems(items){

function renderDeepDive(){
  var grid=document.getElementById('caseGrid');
  var sortEl=document.getElementById('sortMode');
  var sortMode=sortEl?sortEl.value:'score';
  var sorted=filteredCases.slice().sort(function(a,b){
    if(sortMode==='az') return (a.defendant||'').localeCompare(b.defendant||'');
    if(sortMode==='za') return (b.defendant||'').localeCompare(a.defendant||'');
    if(sortMode==='hearing'){
      var ha=a.next_hearing_date?parseDate(a.next_hearing_date):null;
      var hb=b.next_hearing_date?parseDate(b.next_hearing_date):null;
      if(!ha&&!hb) return 0; if(!ha) return 1; if(!hb) return -1;
      return ha-hb;
    }
    return b._score-a._score;
  });
  if(sorted.length===0){grid.innerHTML='<div style="text-align:center;padding:60px;color:var(--text-muted)"><p>No cases match filters.</p></div>';return;}

    } else if(c._stage==='med-booked'||c._stage==='med-prep'||c._stage==='med-scheduling'){
      if(c._mediation){fields.push(['Mediator',c._mediation.mediator||'\u2014']);fields.push(['Med. Date',c._mediation.med_date?formatDate(c._mediation.med_date):'\u2014']);}
      fields.push(['Next Hearing',formatDate(c.next_hearing_date)]);
      fields.push(['Defense Counsel',truncate(c.defense_counsel,50)]);

      fields.push(['Next Hearing',formatDate(c.next_hearing_date)]);

      (c.arb==='?'?'<span class="tag" style="background:var(--yellow-bg);color:var(--yellow)">Arb?</span>':'')+
      (c._score>=25?'<span class="tag" style="background:var(--red-bg);color:var(--red)">\u26a1'+c._score+'</span>':'')+

      }
      if(_svc)html+=_svc;

    }
    html+='<div class="case-card-body">';
    fields.forEach(function(f){if(f[1]&&String(f[1]).trim()&&f[1]!=='\u2014'){
      var style='';

        else if(String(f[1]).indexOf('Awaiting')>=0)style='color:#3b82f6;';
        else if(String(f[1]).indexOf('Pre-discovery')>=0)style='color:#6b7280;';
        else style='color:#10b981;';
      }
      html+='<div class="case-field"><span class="cf-label">'+f[0]+'</span><span class="cf-value"'+( style ? ' style="'+style+'"' : '')+'>'+esc(String(f[1]))+'</span></div>';
    }});
    html+='<div class="case-field"><span class="cf-label">Client Contact</span><span class="cf-value">'+(c.last_client_contact?formatDate(c.last_client_contact):'\u2014')+' <button class="log-contact-btn" onclick="logContact(\''+id+'\',this,event)">\u260E Log Contact</button></span></div>';
    html+='</div>';
    // Editable fields
    html+='<div style="padding:6px 16px"><div class="case-field editable" onclick="startEdit(\''+id+'\',\'team_notes\',this)" title="Click to edit"><span class="cf-label">Team Notes \u270e</span><span class="cf-value">'+esc(truncate(c.team_notes,80)||'Click to add\u2026')+'</span></div></div>';
    html+='<button class="case-expand-btn" onclick="toggleExpand(\''+id+'\')">Show Details \u25be</button>';
    html+='<div class="case-expanded" id="exp-'+id+'">';
    if(c.next_steps)html+='<div class="exp-section"><div class="exp-title">Next Steps</div><div class="exp-text">'+esc(c.next_steps)+'</div></div>';
    if(c.action_items)html+='<div class="exp-section"><div class="exp-title">Action Items</div><div class="exp-text">'+esc(c.action_items)+'</div></div>';
    if(c.team_notes)html+='<div class="exp-section"><div class="exp-title">Team Notes (Full)</div><div class="exp-text">'+esc(c.team_notes)+'</div></div>';
    if(c.disco)html+='<div class="exp-section"><div class="exp-title">Discovery</div><div class="exp-text">'+esc(c.disco)+'</div></div>';
    if(c.sum_summary)html+='<div class="exp-section"><div class="exp-title">Case Summary</div><div class="exp-text">'+esc(c.sum_summary)+'</div></div>';
    if(c.val_indiv_damages||c.val_class_damages||c.val_paga_damages){html+='<div class="exp-section"><div class="exp-title">Valuation</div><div class="exp-text">';
      if(c.val_indiv_damages)html+='Individual: '+esc(c.val_indiv_damages)+'\n';
      if(c.val_class_damages)html+='Class: '+esc(c.val_class_damages)+'\n';
      if(c.val_paga_damages)html+='PAGA: '+esc(c.val_paga_damages);
      html+='</div></div>';}
    html+='</div></div>';
  });
  grid.innerHTML=html;
}

function logContact(caseSlug,el,e){
  if(e)e.stopPropagation();
  var today=new Date().toISOString().slice(0,10);
  el.outerHTML='<span class="log-contact-inline" id="lc-'+caseSlug+'">'+
    '<input type="date" id="lcDate-'+caseSlug+'" value="'+today+'" max="'+today+'">'+
    '<button class="lc-btn lc-save" onclick="saveContact(\''+caseSlug+'\',event)">Save</button>'+
    '<button class="lc-btn lc-cancel" onclick="cancelContact(event)">Cancel</button>'+
    '</span>';
}
function saveContact(caseSlug,e){
  if(e)e.stopPropagation();
  var dateVal=document.getElementById('lcDate-'+caseSlug).value;
  if(!dateVal){showToast('Pick a date',true);return;}
  var c=null;for(var i=0;i<allCases.length;i++){if(caseId(allCases[i])===caseSlug){c=allCases[i];break;}}
  if(!c)return;
  if(!c.matter_id){showToast('No matter_id on case \u2014 cannot log',true);return;}
  // Optimistic local update; trigger will also set last_client_contact server-side via client_contacts.
  c.last_client_contact=dateVal;
  var row={matter_id:c.matter_id,contact_date:dateVal,channel:'call',direction:'outbound',
    team_member:c.attorney||'Ryan Quadrel',client_name:null,source:'manual',
    source_id:'manual-'+c.matter_id+'-'+dateVal+'-'+Date.now(),notes:''};
  if(isLive){
    fetch(SUPABASE_URL+'/rest/v1/client_contacts?on_conflict=source_id',{
      method:'POST',
      headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=minimal,resolution=ignore-duplicates'},
      body:JSON.stringify([row])
    }).then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);showToast('Client contact logged: '+dateVal);})
      .catch(function(err){showToast('Save failed: '+err.message,true);});
  } else {showToast('Saved locally: '+dateVal);}
  applyFilters();
}
function cancelContact(e){if(e)e.stopPropagation();applyFilters();}

  var c=null;for(var i=0;i<allCases.length;i++){if(caseId(allCases[i])===caseSlug){c=allCases[i];break;}}
  if(!c)return;
  var val=c[field]||'';
  el.innerHTML='<textarea class="edit-area" id="editArea">'+esc(val)+'</textarea><div class="edit-actions"><button class="edit-cancel" onclick="cancelEdit(event)">Cancel</button><button class="edit-save" onclick="saveEdit(event,\''+caseSlug+'\',\''+field+'\')">Save</button></div>';
  var ta=document.getElementById('editArea');
  ta.focus();
  ta.setSelectionRange(ta.value.length,ta.value.length);
  editingCase=caseSlug;editingField=field;
}

function cancelEdit(e){e.stopPropagation();applyFilters();}

function saveEdit(e,caseSlug,field){
  e.stopPropagation();
  var val=document.getElementById('editArea').value;
  // Update in-memory
  for(var i=0;i<allCases.length;i++){
    if(caseId(allCases[i])===caseSlug){allCases[i][field]=val;break;}
  }
  // Save to Supabase if live
  if(isLive){
    var c=null;for(var i=0;i<allCases.length;i++){if(caseId(allCases[i])===caseSlug){c=allCases[i];break;}}
    if(c&&c.id){
      var body={};body[field]=val;
      fetch(SUPABASE_URL+'/rest/v1/active_cases?id=eq.'+c.id,{
        method:'PATCH',headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
        body:JSON.stringify(body)
      }).then(function(){showToast('Saved to Supabase');}).catch(function(){showToast('Saved locally (Supabase unavailable)',true);});
    }
  } else {showToast('Saved locally');}
  editingCase=null;editingField=null;
  applyFilters();
}

function showToast(msg,isErr){var t=document.getElementById('toast');t.textContent=msg;t.className='toast show'+(isErr?' error':'');setTimeout(function(){t.className='toast';},3000);}

function openModal(idx){
  var c=null;for(var i=0;i<allCases.length;i++){if(allCases[i]._idx===idx){c=allCases[i];break;}}
  if(!c)return;
  var stage=null;for(var s=0;s<STAGES.length;s++){if(STAGES[s].id===c._stage){stage=STAGES[s];break;}}
  var fields=[['Case Name',c.case_name],['Plaintiff',c.plaintiff],['Defendant',c.defendant],['Case #',c.case_number],['Type',c.case_type],['Attorney',c.attorney],['Venue',c.venue],['Judge/Dept',c.judge_dept],['Filed',c.file_date],['Defense Counsel',c.defense_counsel],['Arb',c.arb],['Stayed',c.is_stayed?'Yes':'No'],['Stage',stage?stage.label:'\u2014'],['Service',c.service_completed],['Next Hearing',formatDate(c.next_hearing_date)],['Event',c.event],['Last Client Contact',formatDate(c.last_client_contact)],['Last Team Update',formatDate(c.last_team_update)],['Discovery',c.disco],['Next Steps',c.next_steps],['Action Items',c.action_items],['Team Notes',c.team_notes],['Competing Cases',c.competing_cases],['Co-Counsel',c.co_counsel],['Case Summary',c.sum_summary],['Individual Damages',c.val_indiv_damages],['Class Damages',c.val_class_damages],['PAGA Damages',c.val_paga_damages]];
  var html='<button class="modal-close" onclick="closeModal()">\u2715</button><h2>'+esc(c.defendant||c.case_name)+'</h2>';
  html+='<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px"><span class="tag tag-'+c.attorney.toLowerCase()+'">'+c.attorney+'</span><span class="tag '+(c.case_type==='PAGA'?'tag-paga':'tag-class')+'">'+(c.case_type||'?')+'</span>';
  if(stage)html+='<span class="tag '+stage.color+'">'+stage.label+'</span>';
  if(c._score>=20)html+='<span class="tag" style="background:var(--red-bg);color:var(--red)">\u26a1'+c._score+'</span>';
  html+='</div>';
  // Cross-dashboard badges in modal
  if(c._motion){var mcls=c._motion.status==='WON'?'won':c._motion.status==='LOST'?'lost':'';html+='<div style="margin-bottom:8px"><span class="cross-badge motion '+mcls+'">\u2696 '+esc(c._motion.motion)+' \u2014 '+esc(c._motion.status)+(c._motion.hearing?' \u00b7 Hearing '+formatDate(c._motion.hearing):'')+'</span></div>';}
  if(c._mediation){html+='<div style="margin-bottom:12px"><span class="cross-badge mediation">\u2693 Mediation: '+esc(c._mediation.phase)+(c._mediation.mediator?' \u00b7 '+esc(c._mediation.mediator):'')+(c._mediation.med_date?' \u00b7 '+formatDate(c._mediation.med_date):'')+'</span>';var stratUrl=null;Object.keys(STRATEGY_DASHBOARDS).forEach(function(k){if(c.defendant&&c.defendant.indexOf(k)>=0)stratUrl=STRATEGY_DASHBOARDS[k];});if(stratUrl)html+=' <a href="'+stratUrl+'" target="_blank" style="display:inline-block;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:600;background:rgba(99,102,241,0.15);color:#818cf8;text-decoration:none;margin-left:6px">\u{1F3AF} Strategy Dashboard</a>';html+='</div>';}
  if(c._cmc&&c._cmc.filing_deadline){html+='<div style="margin-bottom:8px"><span class="cross-badge cmc">' + String.fromCharCode(0x1F4C5) + ' '+esc(c._cmc.hearing_type||'CMC')+' filing due '+formatDate(c._cmc.filing_deadline)+'</span></div>';}
  var _svcM=serviceBadgeHTML(c);if(_svcM){html+='<div style="margin-bottom:8px">'+_svcM+'</div>';}
  if(c._reasons&&c._reasons.length>0){html+='<div style="margin-bottom:12px;display:flex;flex-wrap:wrap;gap:4px">';c._reasons.forEach(function(r){html+='<span class="reason-tag '+r.level+'">'+r.text+'</span>';});html+='</div>';}
  fields.forEach(function(f){if(f[1]&&String(f[1]).trim())html+='<div class="case-field"><span class="cf-label">'+f[0]+'</span><span class="cf-value" style="white-space:pre-wrap;text-align:left;margin-left:12px">'+esc(String(f[1]))+'</span></div>';});
  var mslug=caseId(c);
  html+='<div class="case-field" style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border)"><span class="cf-label">Client Contact</span><span class="cf-value">'+(c.last_client_contact?formatDate(c.last_client_contact):'\u2014')+' <button class="log-contact-btn" onclick="logContact(\''+mslug+'\',this,event)">\u260E Log Contact</button></span></div>';
  document.getElementById('modalContent').innerHTML=html;
  document.getElementById('modalOverlay').classList.add('show');
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('show');}
function toggleExpand(id){var el=document.getElementById('exp-'+id);if(el){var sh=el.classList.contains('show');el.classList.toggle('show');var btn=el.previousElementSibling;if(btn)btn.textContent=sh?'Show Details \u25be':'Hide Details \u25b4';}}
function updateCounts(){
  var urgent=filteredCases.filter(function(c){return c._score>=25}).length;
  document.getElementById('attentionCount').textContent=urgent;
  document.getElementById('pipelineCount').textContent=filteredCases.length;
  document.getElementById('deepdiveCount').textContent=filteredCases.length;
  buildCallsList();
}

async function loadCases(){
  _idxCounter=0;
  try{var res=await fetch(SUPABASE_URL+'/rest/v1/active_cases?select=*&order=row_num.asc',{headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}});
    if(res.ok){var data=await res.json();if(data.length>0){allCases=data.map(normalizeCase);isLive=true;return;}}
  }catch(e){}
  _idxCounter=0;
  allCases=EMBEDDED_CASE_DATA.map(normalizeCase);isLive=false;buildCompanionLookup();
}

async function init(){
  try{
    await loadCases();
    // Mark duplicate-defendant cases so cards show case type in name
    var defCount={};allCases.forEach(function(c){var d=c.defendant||'';defCount[d]=(defCount[d]||0)+1;});
    allCases.forEach(function(c){c._isDupe=defCount[c.defendant||'']>1;});
    document.getElementById('statusDot').className='status-dot '+(isLive?'live':'local');
    document.getElementById('statusText').textContent=isLive?'Live \u2014 Supabase':'Local Data (deploy for live sync)';
    document.getElementById('lastUpdated').textContent='As of '+new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit'});
    // Populate venue + stage filters
    var seen={};var venues=[];
    allCases.forEach(function(c){if(c.venue&&!seen[c.venue]){seen[c.venue]=1;venues.push(c.venue);}});
    venues.sort();var vs=document.getElementById('filterVenue');
    venues.forEach(function(v){var o=document.createElement('option');o.value=v;o.textContent=v;vs.appendChild(o);});
    var ss=document.getElementById('filterStage');
    STAGES.forEach(function(s){var o=document.createElement('option');o.value=s.id;o.textContent=s.label;ss.appendChild(o);});
    // Events
    document.getElementById('searchInput').addEventListener('input',applyFilters);
    ['filterAttorney','filterVenue','filterArb','filterType','filterStage','userSelect'].forEach(function(id){document.getElementById(id).addEventListener('change',applyFilters);});
    document.querySelectorAll('.layer-tab').forEach(function(tab){
      tab.addEventListener('click',function(){
        document.querySelectorAll('.layer-tab').forEach(function(t){t.classList.remove('active');});
        document.querySelectorAll('.layer').forEach(function(l){l.classList.remove('active');});
        tab.classList.add('active');
        document.getElementById('layer-'+tab.getAttribute('data-layer')).classList.add('active');
      });
    });
    document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===e.currentTarget)closeModal();});
    document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal();});
    document.getElementById('loadingMsg').style.display='none';
    document.getElementById('mainContent').style.display='block';
    applyFilters();
  }catch(e){
    document.getElementById('loadingMsg').style.display='none';
    var el=document.getElementById('errorMsg');el.style.display='block';
    el.innerHTML='<p>Dashboard failed to load: '+esc(e.message)+'</p><pre>'+esc(e.stack)+'</pre>';
  }
}
init();

function buildCallsList(){
  // Defensive dedup by matter_id — active_cases has separate (Class) and (PAGA)
  // rows for cases filed both ways (e.g., Merical Class + Merical PAGA share
  // matter_id="merical" but have different case_name). For client-call purposes
  // those are the same matter and the team only needs one row. The earlier
  // attempt deduped by caseId() but caseId includes _idx (always unique per
  // EMBEDDED_CASE_DATA row), so dedup was a no-op. Fixed 2026-04-16.
  var seen={};
  var fc=allCases.filter(function(c){
    if(isPostSettlementGated(c))return false;
    var k=c.matter_id||caseId(c);
    if(seen[k])return false;
    seen[k]=true;
    return true;
  });
  document.getElementById('callsCount').textContent=fc.length;
  var tbody=document.getElementById('callsBody');
  if(!tbody)return;
  // Sort by staleness: no contact > oldest contact > newest
  fc.sort(function(a,b){
    var aDate=a.last_client_contact?parseDate(a.last_client_contact):null;
    var bDate=b.last_client_contact?parseDate(b.last_client_contact):null;
    if(!aDate&&!bDate)return 0;
    if(!aDate)return -1;
    if(!bDate)return 1;
    return aDate-bDate; // oldest first
  });
  var html='';
  fc.forEach(function(c){
    var id=caseId(c);
    var lcd=c.last_client_contact;
    var lcdDate=lcd?parseDate(lcd):null;
    var days=lcdDate?daysBetween(TODAY,lcdDate):'—';
    var cls='stale-ok';
    if(!lcdDate||days>120)cls='stale-critical';
    else if(days>90)cls='stale-high';
    else if(days>60)cls='stale-medium';
    var status='';
    if(c._mediation&&c._mediation.phase)status=c._mediation.phase.split(' — ')[0]||'';
    if(c._motion&&c._motion.status)status+=(status?' | ':'')+c._motion.motion+' '+c._motion.status;
    if(!status&&c.is_stayed)status='Stayed';
    html+='<tr onclick="openCase(\''+id+'\')" style="cursor:pointer">'+
      '<td><strong>'+esc(c.defendant||'Unknown')+'</strong><div style="font-size:.7rem;color:var(--text-dim)">'+esc(c.plaintiff||'')+'</div></td>'+
      '<td>'+esc(c.attorney||'—')+'</td>'+
      '<td class="'+cls+'">'+(lcd?formatDate(lcd):'None')+'</td>'+
      '<td class="'+cls+'">'+(typeof days==="number"?days+'d':'—')+'</td>'+
      '<td style="font-size:.75rem">'+esc(status)+'</td>'+
      '<td><button class="log-btn" onclick="logContact(\''+id+'\',this,event)">\u260E Log</button></td>'+
      '</tr>';
  });
  tbody.innerHTML=html;
}
var _callsSortCol=-1,_callsSortAsc=true;
function sortCallsTable(col){
  if(_callsSortCol===col)_callsSortAsc=!_callsSortAsc;
  else{_callsSortCol=col;_callsSortAsc=true;}
  var tbody=document.getElementById('callsBody');
  var rows=Array.prototype.slice.call(tbody.querySelectorAll('tr'));
  rows.sort(function(a,b){
    var at=a.cells[col].textContent.trim();
    var bt=b.cells[col].textContent.trim();
    if(col===3){at=parseInt(at)||9999;bt=parseInt(bt)||9999;return _callsSortAsc?at-bt:bt-at;}
    return _callsSortAsc?at.localeCompare(bt):bt.localeCompare(at);
  });
  rows.forEach(function(r){tbody.appendChild(r);});
}
