<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mediation Strategy Archive — Blackstone Law</title>
<style>
  :root { color-scheme: dark; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #0a0e1a;
    color: #e8ecf4;
    line-height: 1.5;
    padding: 24px;
    min-height: 100vh;
    max-width: 1200px;
    margin: 0 auto;
  }
  .header {
    display: flex; justify-content: space-between; align-items: baseline;
    padding-bottom: 16px; border-bottom: 1px solid #1f2a44; margin-bottom: 24px;
  }
  .header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
  .header .back { font-size: 13px; color: #8b95a8; text-decoration: none; }
  .header .back:hover { color: #e8ecf4; }
  .controls {
    display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .search {
    flex: 1; min-width: 240px;
    background: #131a2e; border: 1px solid #1f2a44; color: #e8ecf4;
    padding: 10px 14px; border-radius: 8px; font-size: 14px; outline: none;
  }
  .search:focus { border-color: #6366f1; }
  .sort-btn {
    background: #131a2e; border: 1px solid #1f2a44; color: #e8ecf4;
    padding: 8px 14px; border-radius: 8px; font-size: 13px;
    cursor: pointer; font-weight: 500;
  }
  .sort-btn.active { background: #6366f1; border-color: #6366f1; color: white; }
  .sort-btn:hover:not(.active) { border-color: #6366f1; }
  .count {
    font-size: 12px; color: #8b95a8; margin-left: auto;
  }
  .grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
  }
  .card {
    background: #131a2e; border: 1px solid #1f2a44; border-radius: 10px;
    padding: 16px; cursor: pointer; transition: all 0.15s ease;
    text-decoration: none; color: inherit; display: block;
  }
  .card:hover { border-color: #6366f1; transform: translateY(-1px); }
  .card .case-name { font-size: 15px; font-weight: 700; margin-bottom: 8px; line-height: 1.3; }
  .card .meta { font-size: 12px; color: #8b95a8; line-height: 1.7; }
  .card .meta strong { color: #e8ecf4; font-weight: 500; }
  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px;
    font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
    margin-bottom: 10px;
  }
  .badge.upcoming { background: rgba(99,102,241,0.15); color: #818cf8; }
  .badge.archived { background: rgba(139,149,168,0.15); color: #8b95a8; }
  .empty {
    text-align: center; padding: 40px; color: #8b95a8; font-size: 14px;
    background: #131a2e; border: 1px dashed #1f2a44; border-radius: 10px;
  }
</style>
</head>
<body>
<div class="header">
  <h1>Mediation Strategy Archive</h1>
  <a href="/" class="back">&larr; Mission Control</a>
</div>
<div class="controls">
  <input type="text" class="search" id="searchInput" placeholder="Search by case name, mediator, or date...">
  <button class="sort-btn active" id="sortNew" onclick="setSort('new')">Newest First</button>
  <button class="sort-btn" id="sortAlpha" onclick="setSort('alpha')">A &rarr; Z</button>
  <span class="count" id="count"></span>
</div>
<div class="grid" id="grid"></div>
<script>
const ENTRIES = [{"slug": "douglas-veridiam", "case_name": "Douglas, et al. v. Veridiam, Inc.", "mediation_date": "2026-04-27", "mediator": "Steven Rottman", "status": "Upcoming"}, {"slug": "agpalza-magnolia-springs", "case_name": "Agpalza v. Magnolia Springs, Inc. and Mission Wells, Inc.", "mediation_date": "2026-04-13", "mediator": "Carl J. West", "status": "Upcoming"}, {"slug": "santamaria-america-central", "case_name": "Santamaria v. America Central Corporation, et al.", "mediation_date": "2026-04-10", "mediator": "Brandon McKelvey", "status": "Upcoming"}, {"slug": "soto-control-air", "case_name": "Soto v. Control Air Enterprises, LLC", "mediation_date": "2026-04-09", "mediator": "Gig Kyriacou", "status": "Upcoming"}, {"slug": "golden-rain", "case_name": "Bassell, Mayoka v. Golden Rain Foundation", "mediation_date": "2026-04-02", "mediator": "TBD", "status": "Archived"}, {"slug": "vasquez-lulus", "case_name": "Vasquez Lulus", "mediation_date": "", "mediator": "", "status": "Archived"}];
let sortMode = 'new';
function fmtDate(d){
  if(!d) return '';
  const dt = new Date(d + 'T12:00:00');
  if (isNaN(dt)) return d;
  return dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}
function render(){
  const q = (document.getElementById('searchInput').value || '').toLowerCase();
  let rows = ENTRIES.filter(e =>
    e.case_name.toLowerCase().includes(q) ||
    (e.mediator||'').toLowerCase().includes(q) ||
    (e.mediation_date||'').toLowerCase().includes(q)
  );
  if (sortMode === 'new') {
    rows.sort((a,b)=> (b.mediation_date||'').localeCompare(a.mediation_date||''));
  } else {
    rows.sort((a,b)=> a.case_name.localeCompare(b.case_name));
  }
  const grid = document.getElementById('grid');
  grid.innerHTML = rows.length ? rows.map(e => `
    <a class="card" href="/mediation-strategy/${e.slug}/">
      <span class="badge ${e.status==='Upcoming'?'upcoming':'archived'}">${e.status}</span>
      <div class="case-name">${e.case_name}</div>
      <div class="meta">
        <strong>${fmtDate(e.mediation_date)}</strong><br>
        Mediator: <strong>${e.mediator||'—'}</strong>
      </div>
    </a>
  `).join('') : '<div class="empty">No archived strategies match.</div>';
  document.getElementById('count').textContent = rows.length + ' / ' + ENTRIES.length + ' archived';
}
function setSort(m){
  sortMode = m;
  document.getElementById('sortNew').classList.toggle('active', m==='new');
  document.getElementById('sortAlpha').classList.toggle('active', m==='alpha');
  render();
}
document.getElementById('searchInput').addEventListener('input', render);
render();
</script>
</body>
</html>
